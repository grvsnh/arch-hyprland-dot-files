############################
# BACKGROUND
############################
background {
    monitor =
    path = ~/.config/omarchy/current/background
    blur_size = 10
    blur_passes = 3
    noise = 0.015
    contrast = 1.03
    brightness = 0.90
    vibrancy = 0.10
}

############################
# GENERAL
############################
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

############################
# DATE
############################
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %b")"
    color = rgba(235, 235, 235, 0.75)
    font_size = 36
    font_family = CaskaydiaMono Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

############################
# TIME — 24 HOUR FORMAT
############################
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(245, 245, 245, 1)
    font_size = 140
    font_family = CaskaydiaMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

############################
# GREETER
############################
label {
    monitor =
    text = cmd[update:200] ~/.config/scripts/hyprlock-greeter.sh
    color = rgba(230, 230, 230, 0.70)
    font_size = 20
    font_family = CaskaydiaMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

############################
# PASSWORD INPUT
############################
input-field {
    monitor =
    size = 360, 72
    outline_thickness = 1

    # Normal state
    outer_color = rgba(255, 255, 255, 0.20)
    inner_color = rgba(20, 20, 25, 0.35)
    font_color = rgba(245, 245, 245, 1)

    # Success
    check_color = rgba(180, 220, 180, 1)

    # ❌ Wrong password — RED GLOW
    fail_color = rgba(255, 80, 80, 1)
    fail_text_color = rgba(255, 120, 120, 1)

    rounding = 18
    fade_on_empty = false

    dots_size = 0.16
    dots_spacing = 0.32
    dots_center = true

    placeholder_text = Password
    hide_input = false

    font_family = CaskaydiaMono Nerd Font
    position = 0, -170
    halign = center
    valign = center
}

############################
# WEATHER + BATTERY
############################
label {
    monitor =
    text = cmd[update:1500] bash ~/.config/scripts/hyprlock-weather.sh
    color = rgba(225, 225, 225, 0.70)
    font_size = 18
    font_family = CaskaydiaMono Nerd Font
    position = 0, -270
    halign = center
    valign = center
}

############################
# MUSIC
############################
label {
    monitor =
    text = cmd[update:1000] ~/.config/scripts/music-progress.sh
    font_size = 17
    font_family = CaskaydiaMono Nerd Font
    color = rgba(220, 220, 220, 0.75)
    position = 0, -330
    halign = center
    valign = center
}

